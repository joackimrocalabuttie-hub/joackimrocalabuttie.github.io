<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Joackim ROCA-LABUTTIE</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root { 
      --accent: #60a5fa; 
      --bg: #0b0f1a; 
      --card: rgba(255, 255, 255, 0.03);
      --border: rgba(255, 255, 255, 0.08);
      --text: #f8fafc;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      background-image: radial-gradient(circle at 20% 20%, rgba(96, 165, 250, 0.05) 0%, transparent 40%),
                        radial-gradient(circle at 80% 80%, rgba(168, 85, 247, 0.05) 0%, transparent 40%);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      line-height: 1.6;
      padding-top: 140px; /* Ajusté pour le bandeau standard */
      overflow-x: hidden;
    }

    /* --- BANDEAU DE NAVIGATION HARMONISÉ --- */
    nav {
      position: fixed; 
      top: 0; 
      width: 100%; 
      padding: 25px 60px;
      display: flex; 
      justify-content: space-between; 
      align-items: center;
      background: rgba(11, 15, 26, 0.85); 
      backdrop-filter: blur(15px);
      z-index: 1000; 
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .nav-links a { 
      text-decoration: none; 
      color: var(--text); 
      font-weight: 500; 
      margin-left: 35px;
      opacity: 0.6; 
      transition: 0.4s; 
      position: relative;
      font-size: 1rem;
    }

    .nav-links a:hover, .nav-links a.active { 
      opacity: 1; 
      color: var(--accent); 
    }

    .nav-links a::after {
      content: ''; 
      position: absolute; 
      bottom: -5px; 
      left: 0; 
      width: 0; 
      height: 2px;
      background: var(--accent); 
      transition: 0.3s;
    }

    .nav-links a:hover::after, .nav-links a.active::after { 
      width: 100%; 
    }

    .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; }

    /* Header */
    .header-section { text-align: center; margin-bottom: 60px; }
    .header-section h1 { font-size: 3rem; font-weight: 900; letter-spacing: -1px; margin-bottom: 10px; }
    .underline { width: 60px; height: 4px; background: var(--accent); margin: 0 auto; border-radius: 2px; }

    /* Contact Grid */
    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      margin-bottom: 80px;
    }

    .info-panel, .form-panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px;
      backdrop-filter: blur(10px);
      transition: 0.4s;
    }

    .info-panel:hover, .form-panel:hover { border-color: var(--accent); }

    h3 { font-size: 1.5rem; margin-bottom: 30px; color: var(--accent); display: flex; align-items: center; gap: 10px; }

    /* Contact Items */
    .contact-item {
      display: flex;
      align-items: flex-start;
      gap: 20px;
      margin-bottom: 25px;
      transition: 0.3s;
    }
    .contact-item:hover { transform: translateX(10px); }
    
    .icon-box {
      width: 45px; height: 45px; background: rgba(96, 165, 250, 0.1);
      border-radius: 10px; display: flex; align-items: center; justify-content: center;
      color: var(--accent); font-size: 1.2rem; flex-shrink: 0;
    }

    .contact-text strong { display: block; color: var(--text); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }
    .contact-text a { color: #94a3b8; text-decoration: none; transition: 0.3s; }
    .contact-text a:hover { color: var(--accent); }

    /* CV Button Custom */
    .cv-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--accent);
      color: #0b0f1a;
      padding: 12px 25px;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 700;
      margin-top: 10px;
      transition: 0.3s;
    }
    .cv-btn:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(96, 165, 250, 0.3); }

    /* Form Styles */
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 8px; font-size: 0.85rem; color: var(--accent); text-transform: uppercase; font-weight: 600; }
    
    input, textarea {
      width: 100%; padding: 12px 16px; background: rgba(255,255,255,0.05);
      border: 1px solid var(--border); border-radius: 12px;
      color: #fff; font-family: inherit; transition: 0.3s;
    }
    
    input:focus, textarea:focus { outline: none; border-color: var(--accent); background: rgba(255,255,255,0.08); }

    .submit-btn {
      width: 100%; padding: 15px; background: transparent;
      border: 1px solid var(--accent); color: var(--accent);
      border-radius: 12px; font-weight: 700; cursor: pointer;
      text-transform: uppercase; transition: 0.3s;
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .submit-btn:hover { background: var(--accent); color: #0b0f1a; }

    @media (max-width: 850px) {
      .contact-grid { grid-template-columns: 1fr; }
      nav { padding: 20px; }
      .nav-links a { margin-left: 15px; font-size: 0.8rem; }
    }
  </style>
</head>
<body>

  <nav>
    <div class="logo"><a href="index.html"><img src="logo.png" alt="Logo" height="50"></a></div>
    <div class="nav-links">
      <a href="index.html">Présentation</a>
      <a href="apropos.html">À propos</a>
      <a href="projet.html">Projets</a>
      <a href="bilan.html">Bilan</a>
      <a href="contact.html" class="active">Contact</a>
    </div>
  </nav>

  <div class="container">
    <header class="header-section">
      <h1>Me Contacter</h1>
      <div class="underline"></div>
    </header>

    <div class="contact-grid">
      <div class="info-panel">
        <h3><i class="fas fa-address-book"></i> Coordonnées</h3>
        
        <div class="contact-item">
          <div class="icon-box"><i class="fas fa-phone"></i></div>
          <div class="contact-text">
            <strong>Téléphone</strong>
            <a href="tel:+33610847815">06 10 84 78 15</a>
          </div>
        </div>

        <div class="contact-item">
          <div class="icon-box"><i class="fas fa-envelope"></i></div>
          <div class="contact-text">
            <strong>Email</strong>
            <a href="mailto:joackimrocalabuttie@gmail.com">joackimrocalabuttie@gmail.com</a>
          </div>
        </div>

        <div class="contact-item">
          <div class="icon-box"><i class="fas fa-map-marker-alt"></i></div>
          <div class="contact-text">
            <strong>Adresse</strong>
            <p style="color: #94a3b8;">110 Impasse de l'oignon<br>79230 St Martin de Bernegoue</p>
          </div>
        </div>

        <div class="contact-item">
            <div class="icon-box"><i class="fab fa-linkedin-in"></i></div>
            <div class="contact-text">
              <strong>LinkedIn</strong>
              <a href="https://www.linkedin.com/in/joackim-roca-labuttie-0728912b8" target="_blank">Joackim Roca Labuttie</a>
            </div>
        </div>

        <div class="contact-item">
          <div class="icon-box"><i class="fas fa-file-pdf"></i></div>
          <div class="contact-text">
            <strong>Curriculum Vitae</strong>
            <a href="cv.pdf" target="_blank" class="cv-btn">
              <i class="fas fa-download"></i> Télécharger CV
            </a>
          </div>
        </div>
      </div>

      <div class="form-panel">
        <h3><i class="fas fa-paper-plane"></i> Envoyer un message</h3>
        <form id="contactForm">
          <div class="form-group">
            <label>Nom complet</label>
            <input type="text" required placeholder="Votre nom...">
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" required placeholder="votre@email.com">
          </div>
          <div class="form-group">
            <label>Sujet</label>
            <input type="text" required placeholder="Objet du message">
          </div>
          <div class="form-group">
            <label>Message</label>
            <textarea rows="5" required placeholder="Comment puis-je vous aider ?"></textarea>
          </div>
          <button type="submit" class="submit-btn">
            Envoyer le message <i class="fas fa-chevron-right"></i>
          </button>
        </form>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('contactForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const btn = this.querySelector('.submit-btn');
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Envoi...';
      
      setTimeout(() => {
        btn.innerHTML = '<i class="fas fa-check"></i> Message envoyé !';
        btn.style.borderColor = '#4ade80';
        btn.style.color = '#4ade80';
        this.reset();
      }, 1500);
    });
  </script>
</body>
</html>
